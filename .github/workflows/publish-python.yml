name: Publish Python Packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Package set to publish"
        required: true
        default: bootstrap-1
        type: choice
        options:
          - bootstrap-1
          - bootstrap-2
          - all

env:
  PURE_PYTHON_ARTIFACT_PREFIX: python-distributions

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate lockstep package versions
        run: python3 scripts/manage_versions.py check

  build-package:
    needs: version-check
    strategy:
      matrix:
        include:
          - package_path: tstring-core
            publish_in_bootstrap_1: true
            publish_in_bootstrap_2: false
          - package_path: json-tstring
            publish_in_bootstrap_1: true
            publish_in_bootstrap_2: false
          - package_path: toml-tstring
            publish_in_bootstrap_1: false
            publish_in_bootstrap_2: true
          - package_path: yaml-tstring
            publish_in_bootstrap_1: false
            publish_in_bootstrap_2: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Build distribution
        if: ${{ github.event.inputs.target == 'all' || (github.event.inputs.target == 'bootstrap-1' && matrix.publish_in_bootstrap_1) || (github.event.inputs.target == 'bootstrap-2' && matrix.publish_in_bootstrap_2) }}
        run: uv build "${{ matrix.package_path }}" --out-dir dist

      - name: Check distribution metadata
        if: ${{ github.event.inputs.target == 'all' || (github.event.inputs.target == 'bootstrap-1' && matrix.publish_in_bootstrap_1) || (github.event.inputs.target == 'bootstrap-2' && matrix.publish_in_bootstrap_2) }}
        run: uvx twine check dist/*

      - name: Upload distributions
        if: ${{ github.event.inputs.target == 'all' || (github.event.inputs.target == 'bootstrap-1' && matrix.publish_in_bootstrap_1) || (github.event.inputs.target == 'bootstrap-2' && matrix.publish_in_bootstrap_2) }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PURE_PYTHON_ARTIFACT_PREFIX }}-${{ matrix.package_path }}
          path: dist/*

  build-bindings-wheels:
    needs: version-check
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'bootstrap-1' }}
    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: --release --manifest-path rust/python-bindings/Cargo.toml --out dist --compatibility pypi -i python3.14
          - os: macos
            runner: macos-14
            target: aarch64-apple-darwin
            maturin_args: --release --manifest-path rust/python-bindings/Cargo.toml --out dist --compatibility pypi
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: --release --manifest-path rust/python-bindings/Cargo.toml --out dist --compatibility pypi
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}

      - name: Build bindings wheel (Linux manylinux)
        if: ${{ matrix.os == 'linux' }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.maturin_args }}
          manylinux: "2_28"
          sccache: "true"

      - name: Build bindings wheel (host)
        if: ${{ matrix.os != 'linux' }}
        shell: bash
        run: |
          PYTHON_BIN="$(uv run --python 3.14 python - <<'PY'
          import sys
          print(sys.executable)
          PY
          )"
          uvx maturin build --release --manifest-path rust/python-bindings/Cargo.toml --out dist --compatibility pypi -i "$PYTHON_BIN"

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: bindings-wheels-${{ matrix.os }}
          path: dist/*

  build-bindings-sdist:
    needs: version-check
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'bootstrap-1' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Build source distribution
        run: uvx maturin sdist --manifest-path rust/python-bindings/Cargo.toml --out dist

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: bindings-sdist
          path: dist/*

  publish-package:
    strategy:
      matrix:
        include:
          - package_path: tstring-core
            environment_name: pypi-tstring-core
            publish_in_bootstrap_1: true
            publish_in_bootstrap_2: false
          - package_path: json-tstring
            environment_name: pypi-json-tstring
            publish_in_bootstrap_1: true
            publish_in_bootstrap_2: false
          - package_path: toml-tstring
            environment_name: pypi-toml-tstring
            publish_in_bootstrap_1: false
            publish_in_bootstrap_2: true
          - package_path: yaml-tstring
            environment_name: pypi-yaml-tstring
            publish_in_bootstrap_1: false
            publish_in_bootstrap_2: true
    runs-on: ubuntu-latest
    needs: build-package
    environment:
      name: ${{ matrix.environment_name }}
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        if: ${{ github.event.inputs.target == 'all' || (github.event.inputs.target == 'bootstrap-1' && matrix.publish_in_bootstrap_1) || (github.event.inputs.target == 'bootstrap-2' && matrix.publish_in_bootstrap_2) }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PURE_PYTHON_ARTIFACT_PREFIX }}-${{ matrix.package_path }}
          path: dist/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.target == 'all' || (github.event.inputs.target == 'bootstrap-1' && matrix.publish_in_bootstrap_1) || (github.event.inputs.target == 'bootstrap-2' && matrix.publish_in_bootstrap_2) }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-bindings:
    runs-on: ubuntu-latest
    needs:
      - build-bindings-wheels
      - build-bindings-sdist
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'bootstrap-1' }}
    environment:
      name: pypi-tstring-bindings
    permissions:
      id-token: write
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-wheels-*
          path: dist/
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v8
        with:
          name: bindings-sdist
          path: dist/

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
